<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="所定管理">
<title>所定管理</title>
<link rel="apple-touch-icon" href="HTMLicon.png">
<link rel="icon" type="image/png" href="HTMLicon.png">
<style>
  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { touch-action: manipulation; cursor: pointer; }

  /* ===== ヘッダー ===== */
  .app-header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }
  .month-nav-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 36px;
    height: 36px;
    font-size: 18px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .month-nav-btn:active { background: #f0f0f0; }
  .month-title {
    font-size: 17px;
    font-weight: 600;
    color: #222;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .settings-btn:active { background: #f0f0f0; }

  /* サマリー帯 */
  .summary-bar {
    padding: 8px 16px 12px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .summary-item {
    background: #f8f8f8;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }
  .summary-label {
    font-size: 11px;
    color: #888;
    margin-bottom: 3px;
  }
  .summary-value {
    font-size: 15px;
    font-weight: 700;
    color: #333;
  }
  .summary-value.positive { color: #1a7f3c; }
  .summary-value.target-up { color: #c0392b; }
  .summary-value.remain { color: #c0392b; }
  .summary-value.remain-zero { color: #999; }

  /* ===== シフト一覧 ===== */
  .list-container {
    padding: 12px 16px;
  }
  .shift-row {
    background: #fff;
    border-radius: 10px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid #e8e8e8;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .shift-row:active { background: #f5f8ff; }
  .shift-row.today { border-left: 4px solid #1565c0; }
  .shift-row.holiday { background: #fafafa; }
  .shift-row.empty .shift-time { color: #bbb; }

  .day-col {
    min-width: 44px;
    text-align: center;
    margin-right: 10px;
  }
  .day-num {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    color: #222;
  }
  .day-num.sun { color: #c0392b; }
  .day-num.sat { color: #1565c0; }
  .day-week {
    font-size: 11px;
    color: #999;
  }
  .day-week.sun { color: #c0392b; }
  .day-week.sat { color: #1565c0; }

  .shift-symbol {
    min-width: 36px;
    height: 36px;
    border-radius: 6px;
    background: #e8eaf6;
    color: #3949ab;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
  }
  .shift-symbol.holiday-symbol {
    background: #fce4ec;
    color: #c62828;
  }
  .shift-symbol.empty-symbol {
    background: #f5f5f5;
    color: #bbb;
  }

  .shift-info {
    flex: 1;
    min-width: 0;
  }
  .shift-time {
    font-size: 13px;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shift-sub {
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }

  .comp-badge {
    min-width: 50px;
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    padding-left: 8px;
  }
  .comp-badge.pos { color: #1a7f3c; }
  .comp-badge.neg { color: #c0392b; }
  .comp-badge.zero { color: #999; }
  .comp-badge.none { color: #ddd; }

  /* ===== モーダル ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: #fff;
    width: 100%;
    max-height: 90vh;
    border-radius: 16px 16px 0 0;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
    -webkit-overflow-scrolling: touch;
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid #f0f0f0;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: #222;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: #888;
    padding: 4px;
    line-height: 1;
  }
  .modal-body { padding: 16px; }

  /* フォーム */
  .form-section {
    margin-bottom: 18px;
    border-radius: 10px;
    padding: 12px;
  }
  .form-section.section-before {
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
  }
  .form-section.section-after {
    background: #e8f0fe;
    border: 1px solid #c4d9f5;
  }
  .form-section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    padding-bottom: 6px;
  }
  .section-before .form-section-title {
    color: #666;
    border-bottom: 1px solid #d0d0d0;
  }
  .section-after .form-section-title {
    color: #1565c0;
    border-bottom: 1px solid #a8c8f0;
  }
  .section-before .form-input[readonly] {
    background: transparent;
    border-color: transparent;
    color: #555;
    pointer-events: none;
  }
  .section-divider {
    display: flex;
    align-items: center;
    margin: 14px 0;
    gap: 10px;
  }
  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ccc;
  }
  .section-divider-icon {
    font-size: 16px;
    color: #999;
  }
  .form-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 4px;
  }
  .form-label {
    font-size: 13px;
    color: #555;
    min-width: 32px;
  }
  .form-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 16px;
    color: #333;
    background: #fff;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  .form-input:focus { border-color: #1565c0; }
  .form-input[type="time"] { font-family: inherit; }
  .form-input-sm {
    width: 70px;
    flex: none;
    text-align: center;
  }
  .form-sep {
    font-size: 15px;
    color: #aaa;
  }

  /* 休日チェック */
  input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #1565c0;
    cursor: pointer;
  }

  /* 計算プレビュー */
  .calc-preview {
    background: #f0f4ff;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .calc-item { text-align: center; }
  .calc-item-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .calc-item-value { font-size: 15px; font-weight: 700; color: #1565c0; }
  .calc-item-value.pos { color: #1a7f3c; }
  .calc-item-value.neg { color: #c0392b; }

  /* 保存ボタン */
  .modal-footer {
    padding: 0 16px 16px;
    display: flex;
    gap: 8px;
  }
  .btn-save {
    flex: 1;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
  }
  .btn-save:active { background: #0d47a1; }
  .btn-clear {
    background: #fff;
    color: #c0392b;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 14px;
  }
  .btn-clear:active { background: #fce4ec; }
  .btn-cancel {
    background: #fff;
    color: #666;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 14px;
  }
  .btn-cancel:active { background: #f5f5f5; }

  /* ===== 設定パネル ===== */
  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .settings-overlay.open { display: flex; }
  .settings-sheet {
    background: #fff;
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 0 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 70vh;
    overflow-y: auto;
  }
  .settings-title {
    font-size: 16px;
    font-weight: 700;
    padding: 16px 0 12px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .settings-row {
    padding: 14px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .settings-row-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
  }
  .settings-row-content {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-danger {
    margin-top: 6px;
    width: 100%;
    background: #fff;
    color: #c0392b;
    border: 1px solid #e57373;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
  }
  .btn-danger:active { background: #fce4ec; }
  .shift-code-list {
    margin-top: 8px;
  }
  .shift-code-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .shift-code-item-name {
    font-weight: 700;
    min-width: 40px;
    color: #333;
  }
  .shift-code-item-detail {
    flex: 1;
    color: #666;
  }
  .shift-code-item .btn-del {
    background: none;
    border: none;
    color: #c0392b;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
  }
  .shift-code-add {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .shift-code-add input {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13px;
    outline: none;
  }
  .shift-code-add input:focus {
    border-color: #1565c0;
  }
  .shift-code-add .inp-name { width: 50px; }
  .shift-code-add .inp-time { width: 70px; }
  .shift-code-add .inp-brk { width: 50px; }
  .btn-add-code {
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    white-space: nowrap;
  }
  .btn-save-target {
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    white-space: nowrap;
  }
  .btn-save-target:active { background: #0d47a1; }
  .btn-csv {
    flex: 1;
    background: #fff;
    color: #1565c0;
    border: 1px solid #1565c0;
    border-radius: 6px;
    padding: 10px 8px;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
  }
  .btn-csv:active { background: #e3f2fd; }
  .btn-csv-import { display: inline-flex; align-items: center; justify-content: center; }
  .btn-send {
    margin-top: 6px;
    width: 100%;
    background: #2e7d32;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
  }
  .btn-send:active { background: #1b5e20; }
  .btn-send:disabled { background: #aaa; }

  /* ===== シフトコードボタン ===== */
  .code-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .code-btn {
    background: #e8eaf6;
    color: #3949ab;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 14px;
    font-weight: 600;
    touch-action: manipulation;
  }
  .code-btn:active { background: #c5cae9; }
  .code-btn.holiday-btn {
    background: #fce4ec;
    color: #c62828;
  }
  .code-btn.holiday-btn:active { background: #f8bbd0; }
  .code-btn.selected {
    outline: 2px solid #333;
    outline-offset: 1px;
  }
  .code-btn.holiday-btn.selected {
    outline-color: #c62828;
  }

  /* ===== 5分刻み時刻セレクト ===== */
  .time-select-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
  }
  .time-select {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 2px;
    font-size: 16px;
    color: #333;
    background: #fff;
    outline: none;
    text-align: center;
    flex: 1;
  }
  .time-select:focus { border-color: #1565c0; }
  .time-colon {
    font-size: 16px;
    font-weight: 700;
    color: #555;
  }

  /* ===== 一括入力画面 ===== */
  .batch-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .batch-overlay.open { display: flex; }
  .batch-sheet {
    background: #fff;
    width: 100%;
    max-height: 90vh;
    border-radius: 16px 16px 0 0;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
    -webkit-overflow-scrolling: touch;
  }
  .batch-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1;
    border-radius: 16px 16px 0 0;
  }
  .batch-title { font-size: 16px; font-weight: 700; color: #222; }
  .batch-body { padding: 8px 12px; }
  .batch-row {
    display: flex;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid #f0f0f0;
    gap: 8px;
  }
  .batch-row:last-child { border-bottom: none; }
  .batch-row-date {
    min-width: 58px;
    text-align: center;
  }
  .batch-row-num {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    line-height: 1.1;
  }
  .batch-row-num.sun { color: #c0392b; }
  .batch-row-num.sat { color: #1565c0; }
  .batch-row-week {
    font-size: 11px;
    color: #999;
  }
  .batch-row-week.sun { color: #c0392b; }
  .batch-row-week.sat { color: #1565c0; }
  .batch-row-codes {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex: 1;
  }
  .batch-row-code-btn {
    background: #f0f0f0;
    color: #555;
    border: 1.5px solid transparent;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 600;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .batch-row-code-btn:active { background: #e0e0e0; }
  .batch-row-code-btn.selected {
    background: #e3f2fd;
    border-color: #1565c0;
    color: #1565c0;
  }
  .batch-row-current {
    font-size: 11px;
    color: #aaa;
    min-width: 28px;
    text-align: center;
  }
  .batch-row-current.has-value {
    color: #1565c0;
    font-weight: 600;
  }
  .batch-footer {
    padding: 12px 16px 16px;
    display: flex;
    gap: 8px;
    position: sticky;
    bottom: 0;
    background: #fff;
    border-top: 1px solid #f0f0f0;
  }
  .btn-batch-apply {
    flex: 1;
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
  }
  .btn-batch-apply:active { background: #0d47a1; }
  .btn-batch-apply:disabled { background: #bbb; }

  /* ===== 休/有休/半休ボタン ===== */
  .after-type-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .after-type-btn {
    flex: 1;
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 10px 4px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    background: #fff;
    color: #555;
    touch-action: manipulation;
  }
  .after-type-btn:active { background: #f5f5f5; }
  .after-type-btn.selected {
    border-color: #1565c0;
    background: #e3f2fd;
    color: #1565c0;
  }
  .after-type-btn.type-normal.selected {
    border-color: #1565c0;
    background: #e3f2fd;
    color: #1565c0;
  }
  .after-type-btn.type-kyuu.selected {
    border-color: #c62828;
    background: #fce4ec;
    color: #c62828;
  }
  .after-type-btn.type-yuukyuu.selected {
    border-color: #2e7d32;
    background: #e8f5e9;
    color: #2e7d32;
  }
  .after-type-btn.type-hankyuu.selected {
    border-color: #e65100;
    background: #fff3e0;
    color: #e65100;
  }
  .after-type-info {
    font-size: 11px;
    color: #888;
    padding: 6px 10px;
    background: #f8f8f8;
    border-radius: 6px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  /* 一括入力ボタン */
  .batch-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 36px;
    height: 36px;
    font-size: 14px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .batch-btn:active { background: #f0f0f0; }

  /* ===== トースト ===== */
  .toast {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #323232;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<header class="app-header">
  <div class="month-nav">
    <button class="month-nav-btn" id="prevMonthBtn">&#8249;</button>
    <span class="month-title" id="monthTitle">—</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="batch-btn" id="batchBtn" title="一括入力">&#9776;</button>
      <button class="settings-btn" id="settingsBtn">&#9881;</button>
    </div>
  </div>
  <div class="summary-bar">
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">目標時間</div>
        <div class="summary-value" id="summaryTarget">—</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">累計補填</div>
        <div class="summary-value" id="summaryTotal">—</div>
      </div>
      <div class="summary-item">

<script>
// ===== シフトコード定義（shift.xlsx の "shift codes" シートより） =====
const DEFAULT_SHIFT_CODES = {
  'A':   { start:'08:20', end:'17:20', break:60 },
  'B':   { start:'09:00', end:'18:00', break:60 },
  'C':   { start:'09:30', end:'18:30', break:60 },
  '水C': { start:'09:20', end:'18:20', break:60 },
  'D':   { start:'10:00', end:'19:00', break:60 },
  '845': { start:'08:45', end:'17:45', break:60 },
  '945': { start:'09:45', end:'18:45', break:60 },
};

const SHIFT_CODES_KEY = 'shiftManager_codes';

function loadShiftCodes() {
  try {
    const saved = JSON.parse(localStorage.getItem(SHIFT_CODES_KEY));
    if (saved) {
      // デフォルトに新しく追加された記号を補完
      for (const [k, v] of Object.entries(DEFAULT_SHIFT_CODES)) {
        if (!(k in saved)) saved[k] = v;
      }
      return saved;
    }
    return { ...DEFAULT_SHIFT_CODES };
  } catch { return { ...DEFAULT_SHIFT_CODES }; }
}

function saveShiftCodes(codes) {
  localStorage.setItem(SHIFT_CODES_KEY, JSON.stringify(codes));
}

let SHIFT_CODES = loadShiftCodes();

// ===== 時刻セレクト初期化 =====
function initTimeSelects() {
  const hours = Array.from({length:18}, (_,i) => i + 6); // 6〜23時
  const mins5 = ['00','05','10','15','20','25','30','35','40','45','50','55'];
  ['afterStartH','afterEndH'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="--">--</option>' + hours.map(h => `<option value="${String(h).padStart(2,'0')}">${h}</option>`).join('');
  });
  ['afterStartM','afterEndM'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="--">--</option>' + mins5.map(m => `<option value="${m}">${m}</option>`).join('');
  });
  // 休憩時間セレクト（0〜120分、5分刻み、初期値60）
  const breakSel = document.getElementById('afterBreak');
  const breakOpts = [];
  for (let i = 0; i <= 120; i += 5) {
    breakOpts.push(`<option value="${i}"${i === 60 ? ' selected' : ''}>${i}</option>`);
  }
  breakSel.innerHTML = breakOpts.join('');
}

function getAfterTime(prefix) {
  const h = document.getElementById(prefix + 'H').value;
  const m = document.getElementById(prefix + 'M').value;
  if (h === '--' || m === '--') return '';
  return `${h}:${m}`;
}

function setAfterTime(prefix, timeStr) {
  const hEl = document.getElementById(prefix + 'H');
  const mEl = document.getElementById(prefix + 'M');
  if (!timeStr) { hEl.value = '--'; mEl.value = '--'; return; }
  const [h, rawM] = timeStr.split(':');
  hEl.value = h;
  const mRounded = Math.round(parseInt(rawM) / 5) * 5;
  mEl.value = String(mRounded % 60).padStart(2, '0');
}

function applyShiftCode(code) {
  const sc = SHIFT_CODES[code];
  if (!sc) return;
  document.getElementById('symbolInput').value = code;
  document.getElementById('beforeStart').value = sc.start;
  document.getElementById('beforeEnd').value = sc.end;
  document.getElementById('beforeBreak').value = sc.break;
  // 変更後はシフトコードの初期値をセット（変更前と同じ）
  setAfterTime('afterStart', sc.start);
  setAfterTime('afterEnd', sc.end);
  document.getElementById('afterBreak').value = sc.break;
  updateCalcPreview();
}

// ===== データ管理 =====
const STORAGE_KEY = 'shiftManager_v1';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { settings: { defaultTargetMinutes: 0 }, months: {} };
  } catch { return { settings: { defaultTargetMinutes: 0 }, months: {} }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getMonthData(data, ym) {
  if (!data.months[ym]) {
    data.months[ym] = { targetMinutes: data.settings.defaultTargetMinutes, days: {} };
  }
  return data.months[ym];
}

// ===== 日付ユーティリティ =====
const WEEKDAYS = ['日','月','火','水','木','金','土'];

function toYM(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}
function toYMD(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function daysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

// ===== 計算 =====
function timeToMin(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function minToHM(min) {
  if (min === null || min === undefined) return '—';
  const sign = min < 0 ? '-' : '';
  const abs = Math.abs(min);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  if (h === 0) return `${sign}${m}分`;
  if (m === 0) return `${sign}${h}時間`;
  return `${sign}${h}時間${m}分`;
}
function minToHHMM(min) {
  if (min === null || min === undefined) return '—';
  const sign = min < 0 ? '-' : '';
  const abs = Math.abs(min);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  return `${sign}${h}:${String(m).padStart(2,'0')}`;
}

function calcWorkMin(start, end, breakMin) {
  const s = timeToMin(start), e = timeToMin(end);
  if (s === null || e === null) return null;
  const brk = parseInt(breakMin) || 0;
  return e - s - brk;
}

function calcCompMin(workMin) {
  if (workMin === null) return null;
  return workMin - 480;
}

function calcMonthTotals(monthData) {
  let total = 0, enteredDays = 0, targetAdj = 0;
  for (const d of Object.values(monthData.days)) {
    // 休日：勤務時間0基準、変更後入力があればその分を補填として加算
    if (d.isHoliday) {
      const work = calcWorkMin(d.after?.start, d.after?.end, d.after?.break);
      if (work !== null && work > 0) {
        total += work; // 8時間基準ではなく、勤務時間そのものが補填
      }
      enteredDays++;
      continue;
    }
    const afterType = d.afterType || 'normal';
    if (afterType === '休') {
      // 休み：変更前の勤務時間分を目標に加算
      const beforeWork = calcWorkMin(d.before?.start, d.before?.end, d.before?.break);
      if (beforeWork !== null) targetAdj += beforeWork;
      enteredDays++;
    } else if (afterType === '有休') {
      // 有休：8時間勤務と同じ扱い（補填0）
      enteredDays++;
    } else if (afterType === '半休') {
      // 半休：(8時間 - 変更前勤務時間)を目標に加算 + 実勤務があればそれも計算
      const beforeWork = calcWorkMin(d.before?.start, d.before?.end, d.before?.break);
      if (beforeWork !== null) targetAdj += (480 - beforeWork);
      const work = calcWorkMin(d.after?.start, d.after?.end, d.after?.break);
      if (work !== null) {
        const comp = calcCompMin(work);
        if (comp >= 0) {
          total += comp;
        } else {
          targetAdj += Math.abs(comp);
        }
      }
      enteredDays++;
    } else {
      // 通常勤務
      const work = calcWorkMin(d.after?.start, d.after?.end, d.after?.break);
      if (work !== null) {
        const comp = calcCompMin(work);
        if (comp >= 0) {
          total += comp;
        } else {
          targetAdj += Math.abs(comp);
        }
        enteredDays++;
      }
    }
  }
  const effectiveTarget = monthData.targetMinutes + targetAdj;
  return { total, enteredDays, remain: effectiveTarget - total, targetAdj, effectiveTarget };
}

// ===== アプリ状態 =====
let appData = loadData();
let currentDate = new Date();
let editingYMD = null;

function currentYM() { return toYM(currentDate); }


// ===== UI描画 =====
function renderHeader() {
  const ym = currentYM();
  const [y, m] = ym.split('-');
  document.getElementById('monthTitle').textContent = `${y}年${parseInt(m)}月`;

  const monthData = getMonthData(appData, ym);
  const { total, effectiveTarget, remain, targetAdj } = calcMonthTotals(monthData);

  // 目標時間（加算がある場合は赤）
  const targetEl = document.getElementById('summaryTarget');
  targetEl.textContent = minToHM(effectiveTarget);
  targetEl.className = 'summary-value';
  if (targetAdj > 0) targetEl.classList.add('target-up');

  // 累計補填（緑）
  const totalEl = document.getElementById('summaryTotal');
  totalEl.textContent = (total > 0 ? '+' : '') + minToHM(total);
  totalEl.className = 'summary-value';
  if (total > 0) totalEl.classList.add('positive');

  // 残り時間（青、達成時は緑）
  const remainEl = document.getElementById('summaryRemain');
  remainEl.textContent = minToHM(remain);
  remainEl.className = 'summary-value';
  if (remain <= 0) remainEl.classList.add('remain-zero');
  else remainEl.classList.add('remain');
}

function renderList() {
  const ym = currentYM();
  const [y, m] = ym.split('-').map(Number);
  const monthData = getMonthData(appData, ym);
  const days = daysInMonth(y, m - 1);
  const todayYMD = toYMD(new Date());

  let html = '';
  for (let d = 1; d <= days; d++) {
    const date = new Date(y, m - 1, d);
    const ymd = toYMD(date);
    const dow = date.getDay();
    const entry = monthData.days[ymd];
    const isToday = ymd === todayYMD;
    const isSun = dow === 0, isSat = dow === 6;

    let rowClass = 'shift-row';
    if (isToday) rowClass += ' today';

    let symbolHtml = '', timeHtml = '', subHtml = '', compHtml = '';

    if (entry) {
      if (entry.isHoliday) {
        rowClass += ' holiday';
        symbolHtml = `<div class="shift-symbol holiday-symbol">${entry.symbol || '休'}</div>`;
        const work = calcWorkMin(entry.after?.start, entry.after?.end, entry.after?.break);
        if (work !== null && work > 0) {
          timeHtml = `<span class="shift-time">${entry.after.start}〜${entry.after.end}</span>`;
          compHtml = `<span class="comp-badge pos">+${minToHM(work)}</span>`;
        } else {
          timeHtml = `<span class="shift-time" style="color:#999">変更なし</span>`;
          compHtml = `<span class="comp-badge zero">±0</span>`;
        }
      } else {
        const sym = entry.symbol || '?';
        const afterType = entry.afterType || 'normal';
        symbolHtml = `<div class="shift-symbol">${sym}</div>`;

        if (afterType === '休') {
          const beforeWork = calcWorkMin(entry.before?.start, entry.before?.end, entry.before?.break);
          timeHtml = `<span class="shift-time" style="color:#c62828">休</span>`;
          subHtml = `<div class="shift-sub">変更前: ${entry.before?.start || '?'}〜${entry.before?.end || '?'}</div>`;
          compHtml = `<span class="comp-badge neg">目標+${beforeWork !== null ? minToHM(beforeWork) : '8:00'}</span>`;
        } else if (afterType === '有休') {
          timeHtml = `<span class="shift-time" style="color:#2e7d32">有休</span>`;
          subHtml = `<div class="shift-sub">変更前: ${entry.before?.start || '?'}〜${entry.before?.end || '?'}</div>`;
          compHtml = `<span class="comp-badge zero">±0</span>`;
        } else if (afterType === '半休') {
          const beforeWork = calcWorkMin(entry.before?.start, entry.before?.end, entry.before?.break);
          const targetAdd = beforeWork !== null ? (480 - beforeWork) : null;
          const work = calcWorkMin(entry.after?.start, entry.after?.end, entry.after?.break);
          const comp = work !== null ? calcCompMin(work) : null;
          timeHtml = `<span class="shift-time" style="color:#e65100">半休</span>`;
          subHtml = `<div class="shift-sub">変更前: ${entry.before?.start || '?'}〜${entry.before?.end || '?'}</div>`;
          if (comp !== null) {
            if (comp < 0) {
              compHtml = `<span class="comp-badge neg">目標+${minToHM(Math.abs(comp))}</span>`;
            } else {
              const sign = comp > 0 ? '+' : '';
              const cls = comp > 0 ? 'pos' : 'zero';
              compHtml = `<span class="comp-badge ${cls}">${sign}${minToHM(comp)}</span>`;
            }
          } else {
            compHtml = `<span class="comp-badge none">半休</span>`;
          }
        } else {
          const work = calcWorkMin(entry.after?.start, entry.after?.end, entry.after?.break);
          const comp = calcCompMin(work);
          // シフト記号と変更後が一致しているか判定
          const sc = entry.symbol ? SHIFT_CODES[entry.symbol] : null;
          const afterMatch = sc && entry.after &&
            entry.after.start === sc.start && entry.after.end === sc.end && entry.after.break === sc.break;
          if (!entry.after || afterMatch) {
            // 変更後未入力 or シフト記号と同じ → 変更なし
            timeHtml = `<span class="shift-time" style="color:#999">変更なし</span>`;
            compHtml = `<span class="comp-badge zero">±0</span>`;
          } else if (work !== null) {
            const as = entry.after.start, ae = entry.after.end;
            timeHtml = `<span class="shift-time">${as}〜${ae}</span>`;
            subHtml = `<div class="shift-sub">変更前: ${entry.before?.start || '?'}〜${entry.before?.end || '?'}</div>`;
            if (comp < 0) {
              compHtml = `<span class="comp-badge neg">目標+${minToHM(Math.abs(comp))}</span>`;
            } else {
              const sign = comp > 0 ? '+' : '';
              const cls = comp > 0 ? 'pos' : 'zero';
              compHtml = `<span class="comp-badge ${cls}">${sign}${minToHM(comp)}</span>`;
            }
          } else {
            timeHtml = `<span class="shift-time" style="color:#bbb">未入力</span>`;
            compHtml = `<span class="comp-badge none">—</span>`;
          }
        }
      }
    } else {
      rowClass += ' empty';
      symbolHtml = `<div class="shift-symbol empty-symbol">—</div>`;
      timeHtml = `<span class="shift-time">未入力</span>`;
      compHtml = `<span class="comp-badge none">—</span>`;
    }

    html += `
      <div class="${rowClass}" data-ymd="${ymd}" onclick="openModal('${ymd}')">
        <div class="day-col">
          <div class="day-num ${isSun?'sun':isSat?'sat':''}">${d}</div>
          <div class="day-week ${isSun?'sun':isSat?'sat':''}">${WEEKDAYS[dow]}</div>
        </div>
        ${symbolHtml}
        <div class="shift-info">
          ${timeHtml}
          ${subHtml}
        </div>
        ${compHtml}
      </div>`;
  }
  document.getElementById('shiftList').innerHTML = html;
}

function render() {
  renderHeader();
  renderList();
}

// ===== モーダル =====
function openModal(ymd) {
  editingYMD = ymd;
  const ym = currentYM();
  const monthData = getMonthData(appData, ym);
  const entry = monthData.days[ymd] || {};
  const [, m, d] = ymd.split('-');
  const dow = new Date(ymd).getDay();

  document.getElementById('modalTitle').textContent = `${parseInt(m)}月${parseInt(d)}日（${WEEKDAYS[dow]}）`;

  const isHoliday = !!entry.isHoliday;
  document.getElementById('isHoliday').value = isHoliday ? '1' : '0';
  document.getElementById('symbolInput').value = entry.symbol || '';
  const beforeStart = entry.before?.start || '';
  const beforeEnd = entry.before?.end || '';
  const beforeBreak = entry.before?.break !== undefined ? entry.before.break : '';
  document.getElementById('beforeStart').value = beforeStart;
  document.getElementById('beforeEnd').value = beforeEnd;
  document.getElementById('beforeBreak').value = beforeBreak;
  // 変更後が未入力の場合は変更前の値を初期値としてセット
  setAfterTime('afterStart', entry.after?.start || beforeStart);
  setAfterTime('afterEnd', entry.after?.end || beforeEnd);
  document.getElementById('afterBreak').value = entry.after?.break !== undefined ? entry.after.break : beforeBreak;

  // 変更後タイプ設定
  const afterType = entry.afterType || 'normal';
  setAfterType(afterType);

  toggleHolidayMode(isHoliday, !!entry.after);

  // ボタンのハイライト
  if (isHoliday) {
    highlightCodeBtn('休日');
  } else if (entry.symbol && SHIFT_CODES[entry.symbol]) {
    highlightCodeBtn(entry.symbol);
  } else {
    highlightCodeBtn(null);
  }
  updateCalcPreview();
  document.getElementById('modalOverlay').classList.add('open');
}

function toggleHolidayMode(isHoliday, skipAfterClear) {
  const beforeSection = document.getElementById('beforeSection');
  const afterSection = document.getElementById('afterSection');
  const calcPreview = document.getElementById('calcPreview');
  const afterTypeBtns = document.querySelector('.after-type-btns');
  const afterTypeInfo = document.getElementById('afterTypeInfo');
  const sym = document.getElementById('symbolInput');
  const beforeTimeFields = document.getElementById('beforeTimeFields');
  if (isHoliday) {
    // 変更前の時間をクリア
    document.getElementById('beforeStart').value = '';
    document.getElementById('beforeEnd').value = '';
    document.getElementById('beforeBreak').value = '';
    // 変更後の時間もクリア（保存済みデータがなければ）
    if (!skipAfterClear) {
      setAfterTime('afterStart', '');
      setAfterTime('afterEnd', '');
      document.getElementById('afterBreak').value = 60;
    }
    afterSection.style.display = '';
    calcPreview.style.display = '';
    // 休日時は変更後タイプボタンを隠す（通常勤務扱い）
    afterTypeBtns.style.display = 'none';
    afterTypeInfo.style.display = 'none';
    document.getElementById('afterTimeInputs').style.display = '';
    if (!sym.value) sym.value = '休';
  } else {
    afterSection.style.display = '';
    calcPreview.style.display = '';
    afterTypeBtns.style.display = '';
    if (sym.value === '休') sym.value = '';
  }
  updateCalcPreview();
}

function updateCalcPreview() {
  const workEl = document.getElementById('previewWork');
  const compEl = document.getElementById('previewComp');

  // 休日モード：勤務時間0基準、変更後入力があればその分が補填
  const isHoliday = document.getElementById('isHoliday').value === '1';
  if (isHoliday) {
    const start = getAfterTime('afterStart');
    const end = getAfterTime('afterEnd');
    const brk = document.getElementById('afterBreak').value;
    const work = calcWorkMin(start, end, brk);
    if (work !== null && work > 0) {
      workEl.textContent = minToHHMM(work);
      workEl.className = 'calc-item-value';
      compEl.textContent = `+${minToHM(work)}`;
      compEl.className = 'calc-item-value pos';
    } else {
      workEl.textContent = '0:00';
      workEl.className = 'calc-item-value';
      compEl.textContent = '±0';
      compEl.className = 'calc-item-value';
    }
    return;
  }

  if (currentAfterType === '休') {
    const bs = document.getElementById('beforeStart').value;
    const be = document.getElementById('beforeEnd').value;
    const bb = document.getElementById('beforeBreak').value;
    const beforeWork = calcWorkMin(bs, be, bb);
    workEl.textContent = '休み';
    workEl.className = 'calc-item-value';
    compEl.textContent = beforeWork !== null ? `目標+${minToHM(beforeWork)}` : '—';
    compEl.className = 'calc-item-value neg';
    return;
  }
  if (currentAfterType === '有休') {
    workEl.textContent = '8:00（有休）';
    workEl.className = 'calc-item-value';
    compEl.textContent = '±0';
    compEl.className = 'calc-item-value';
    return;
  }
  if (currentAfterType === '半休') {
    const bs = document.getElementById('beforeStart').value;
    const be = document.getElementById('beforeEnd').value;
    const bb = document.getElementById('beforeBreak').value;
    const beforeWork = calcWorkMin(bs, be, bb);
    const targetAdd = beforeWork !== null ? (480 - beforeWork) : null;

    const start = getAfterTime('afterStart');
    const end = getAfterTime('afterEnd');
    const brk = document.getElementById('afterBreak').value;
    const work = calcWorkMin(start, end, brk);
    const comp = work !== null ? calcCompMin(work) : null;

    workEl.textContent = work !== null ? minToHHMM(work) : '—';
    workEl.className = 'calc-item-value';
    let compText = targetAdd !== null ? `目標${targetAdd >= 0 ? '+' : ''}${minToHM(targetAdd)}` : '';
    if (comp !== null) compText += ` / 補填${comp >= 0 ? '+' : ''}${minToHM(comp)}`;
    compEl.textContent = compText || '—';
    compEl.className = 'calc-item-value' + (comp !== null && comp < 0 ? ' neg' : comp !== null && comp > 0 ? ' pos' : '');
    return;
  }

  // 通常
  const start = getAfterTime('afterStart');
  const end = getAfterTime('afterEnd');
  const brk = document.getElementById('afterBreak').value;
  const work = calcWorkMin(start, end, brk);
  const comp = calcCompMin(work);

  if (work !== null) {
    workEl.textContent = minToHHMM(work);
    workEl.className = 'calc-item-value';
    const sign = comp > 0 ? '+' : '';
    compEl.textContent = `${sign}${minToHM(comp)}`;
    compEl.className = 'calc-item-value' + (comp < 0 ? ' neg' : comp > 0 ? ' pos' : '');
  } else {
    workEl.textContent = '—';
    compEl.textContent = '—';
    workEl.className = compEl.className = 'calc-item-value';
  }
}

function saveDay() {
  if (!editingYMD) return;
  const ym = currentYM();
  const monthData = getMonthData(appData, ym);
  const isHoliday = document.getElementById('isHoliday').value === '1';
  const symbol = document.getElementById('symbolInput').value.trim();

  // シフト記号も変更後時間も空 → データ削除（クリア確定）
  const as0 = getAfterTime('afterStart');
  const ae0 = getAfterTime('afterEnd');
  if (!isHoliday && !symbol && !as0 && !ae0) {
    delete monthData.days[editingYMD];
    saveData(appData);
    closeModal();
    render();
    showToast('クリアしました');
    return;
  }

  if (isHoliday) {
    const entry = { isHoliday: true, symbol: symbol || '休' };
    const as = getAfterTime('afterStart');
    const ae = getAfterTime('afterEnd');
    const abVal = parseInt(document.getElementById('afterBreak').value);
    const ab = isNaN(abVal) ? 60 : abVal;
    if (as || ae) entry.after = { start: as, end: ae, break: ab };
    monthData.days[editingYMD] = entry;
  } else {
    const bs = document.getElementById('beforeStart').value;
    const be = document.getElementById('beforeEnd').value;
    const bbVal = parseInt(document.getElementById('beforeBreak').value);
    const bb = isNaN(bbVal) ? 60 : bbVal;
    const afterType = currentAfterType;

    const entry = { symbol };
    if (afterType !== 'normal') entry.afterType = afterType;
    if (bs || be) entry.before = { start: bs, end: be, break: bb };

    if (afterType === 'normal' || afterType === '半休') {
      const as = getAfterTime('afterStart');
      const ae = getAfterTime('afterEnd');
      const abVal2 = parseInt(document.getElementById('afterBreak').value);
      const ab = isNaN(abVal2) ? 60 : abVal2;
      if (as || ae) entry.after = { start: as, end: ae, break: ab };
    }
    monthData.days[editingYMD] = entry;
  }

  saveData(appData);
  closeModal();
  render();
  showToast('保存しました');
}

function clearDay() {
  if (!editingYMD) return;

// ===== CSV エクスポート / インポート =====
function csvExport() {
  const ym = currentYM();
  const [y, m] = ym.split('-').map(Number);
  const monthData = getMonthData(appData, ym);
  const numDays = daysInMonth(y, m - 1);

  const header = '日付,シフト記号,休日,変更後タイプ,変更前開始,変更前終了,変更前休憩,変更後開始,変更後終了,変更後休憩';
  const rows = [header];

  for (let d = 1; d <= numDays; d++) {
    const ymd = toYMD(new Date(y, m - 1, d));
    const entry = monthData.days[ymd] || {};
    const cols = [
      ymd,
      entry.symbol || '',
      entry.isHoliday ? '1' : '0',
      entry.afterType || 'normal',
      entry.before?.start || '',
      entry.before?.end || '',
      entry.before?.break !== undefined ? entry.before.break : '',
      entry.after?.start || '',
      entry.after?.end || '',
      entry.after?.break !== undefined ? entry.after.break : ''
    ];
    rows.push(cols.join(','));
  }

  const bom = '\uFEFF';
  const blob = new Blob([bom + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `shift_${ym}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSVをエクスポートしました');
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxQpoyiVX8J3EhHgHSKme7nCoaiIItLfUOGLmnnK9EcybHNIM7t0cYMYsxQkabYu58/exec';

function csvSend() {
  if (!confirm('スプレッドシートへ送信しますか？')) return;
  const ym = currentYM();
  const [y, m] = ym.split('-').map(Number);
  const monthData = getMonthData(appData, ym);
  const numDays = daysInMonth(y, m - 1);

  const rows = [];
  // ヘッダー行
  rows.push(['日付', 'シフト記号', '休日', '変更後タイプ', '変更前開始', '変更前終了', '変更前休憩', '変更後開始', '変更後終了', '変更後休憩']);
  for (let d = 1; d <= numDays; d++) {
    const ymd = toYMD(new Date(y, m - 1, d));
    const entry = monthData.days[ymd] || {};
    rows.push([
      ymd,
      entry.symbol || '',
      entry.isHoliday ? 1 : 0,
      entry.afterType || 'normal',
      entry.before?.start || '',
      entry.before?.end || '',
      entry.before?.break !== undefined ? entry.before.break : '',
      entry.after?.start || '',
      entry.after?.end || '',
      entry.after?.break !== undefined ? entry.after.break : ''
    ]);
  }

  const btn = document.getElementById('csvSendBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(rows)
  })
  .then(() => {
    showToast('スプレッドシートへ送信しました');
  })
  .catch(err => {
    showToast('送信に失敗しました: ' + err.message);
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = 'スプレッドシートへ送信';
  });
}

function csvImport(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { showToast('データがありません'); return; }

    // ヘッダースキップ
    const dataLines = lines.slice(1);
    let ym = null;
    let imported = 0;

    for (const line of dataLines) {
      const cols = line.split(',');
      if (cols.length < 10) continue;
      const [ymd, symbol, isHol, afterType, bs, be, bb, as, ae, ab] = cols;
      if (!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) continue;

      if (!ym) ym = ymd.substring(0, 7);
      const monthData = getMonthData(appData, ym);

      // 空行（全て空）はスキップ
      if (!symbol && isHol === '0' && !bs && !be && !as && !ae) continue;

      const entry = {};
      if (symbol) entry.symbol = symbol;
      if (isHol === '1') entry.isHoliday = true;
      if (afterType && afterType !== 'normal') entry.afterType = afterType;
      if (bs || be) entry.before = { start: bs, end: be, break: parseInt(bb) || 60 };
      if (as || ae) entry.after = { start: as, end: ae, break: parseInt(ab) || 60 };

      monthData.days[ymd] = entry;
      imported++;
    }

    if (imported > 0) {
      saveData(appData);
      // インポートした月に移動
      if (ym) {
        const [iy, im] = ym.split('-').map(Number);
        currentDate = new Date(iy, im - 1, 1);
      }
      render();
      closeSettings();
      showToast(`${imported}日分をインポートしました`);
    } else {
      showToast('インポートできるデータがありませんでした');
    }
  };
  reader.readAsText(file);
}

let batchSelections = {}; // { ymd: code }

function openBatch() {
  const ym = currentYM();
  const [y, m] = ym.split('-').map(Number);
  const monthData = getMonthData(appData, ym);

  document.getElementById('batchTitle').textContent = `${y}年${m}月 変更前シフト`;

  // 既存データから初期選択を復元
  batchSelections = {};
  for (const [ymd, entry] of Object.entries(monthData.days)) {
    if (entry.isHoliday) {
      batchSelections[ymd] = '休';
    } else if (entry.symbol && SHIFT_CODES[entry.symbol]) {
      batchSelections[ymd] = entry.symbol;
    }
  }

  renderBatchDays();
  document.getElementById('batchOverlay').classList.add('open');
}

function renderBatchDays() {
  const ym = currentYM();
  const [y, m] = ym.split('-').map(Number);
  const days = daysInMonth(y, m - 1);
  const codes = Object.keys(SHIFT_CODES);

  let html = '';
  for (let d = 1; d <= days; d++) {
    const date = new Date(y, m - 1, d);
    const ymd = toYMD(date);
    const dow = date.getDay();
    const isSun = dow === 0, isSat = dow === 6;
    const selected = batchSelections[ymd] || '';

    html += `<div class="batch-row">
      <div class="batch-row-date">
        <div class="batch-row-num ${isSun?'sun':isSat?'sat':''}">${d}</div>
        <div class="batch-row-week ${isSun?'sun':isSat?'sat':''}">${WEEKDAYS[dow]}</div>
      </div>
      <div class="batch-row-codes">
        ${codes.map(code =>
          `<button type="button" class="batch-row-code-btn${selected === code ? ' selected' : ''}"
            onclick="selectBatchCode('${ymd}','${code}',this)">${code}</button>`
        ).join('')}
        <button type="button" class="batch-row-code-btn${selected === '休' ? ' selected' : ''}" style="${selected === '休' ? 'background:#fce4ec;border-color:#c62828;color:#c62828' : 'background:#fce4ec;color:#c62828'}"
          onclick="selectBatchCode('${ymd}','休',this)">休</button>
      </div>
    </div>`;
  }
  document.getElementById('batchDayList').innerHTML = html;
}

function selectBatchCode(ymd, code, btnEl) {
  // トグル: 同じコードを再タップで解除
  if (batchSelections[ymd] === code) {
    delete batchSelections[ymd];
    btnEl.classList.remove('selected');
  } else {
    batchSelections[ymd] = code;
    // 同じ行の他のボタンの選択を解除
    btnEl.parentElement.querySelectorAll('.batch-row-code-btn').forEach(b => b.classList.remove('selected'));
    btnEl.classList.add('selected');
  }
}

function applyBatch() {
  const ym = currentYM();
  const monthData = getMonthData(appData, ym);
  let count = 0;

  for (const [ymd, code] of Object.entries(batchSelections)) {
    if (code === '休') {
      monthData.days[ymd] = { isHoliday: true, symbol: '休' };
      count++;
      continue;
    }
    const sc = SHIFT_CODES[code];
    if (!sc) continue;
    if (!monthData.days[ymd]) {
      monthData.days[ymd] = {};
    }
    const entry = monthData.days[ymd];
    // 休日だった場合は休日フラグを外す
    if (entry.isHoliday) delete entry.isHoliday;
    entry.symbol = code;
    entry.before = { start: sc.start, end: sc.end, break: sc.break };
    count++;
  }

  saveData(appData);
  closeBatch();
  render();
  showToast(`${count}日分を保存しました`);
}

  document.getElementById('batchOverlay').classList.remove('open');
}

// シフトコードボタンを生成（動的）
function renderCodeBtns(selectedCode) {
  const codeBtns = document.getElementById('codeBtns');
  codeBtns.innerHTML = '';
  Object.keys(SHIFT_CODES).forEach(code => {
    const btn = document.createElement('button');
    btn.className = 'code-btn';
    if (selectedCode === code) btn.classList.add('selected');
    btn.textContent = code;
    btn.type = 'button';
    btn.addEventListener('click', () => {
      applyShiftCode(code);
      // 休日モード解除
      document.getElementById('isHoliday').value = '0';
      toggleHolidayMode(false);
      highlightCodeBtn(code);
    });
    codeBtns.appendChild(btn);
  });
  // 「休」ボタンを追加
  const holidayBtn = document.createElement('button');
  holidayBtn.className = 'code-btn holiday-btn';
  if (selectedCode === '休日') holidayBtn.classList.add('selected');
  holidayBtn.textContent = '休';
  holidayBtn.type = 'button';
  holidayBtn.addEventListener('click', () => {
    const isHol = document.getElementById('isHoliday');
    const nowHoliday = isHol.value === '1';
    if (nowHoliday) {
      // トグルOFF
      isHol.value = '0';
      toggleHolidayMode(false);
      highlightCodeBtn(null);
    } else {
      isHol.value = '1';
      document.getElementById('symbolInput').value = '休';
      toggleHolidayMode(true);
      highlightCodeBtn('休日');
    }
  });
  codeBtns.appendChild(holidayBtn);
}

function highlightCodeBtn(selectedCode) {
  document.querySelectorAll('#codeBtns .code-btn').forEach(btn => btn.classList.remove('selected'));
  if (!selectedCode) return;
  const btns = document.querySelectorAll('#codeBtns .code-btn');
  btns.forEach(btn => {
    if (selectedCode === '休日' && btn.classList.contains('holiday-btn')) btn.classList.add('selected');
    else if (btn.textContent === selectedCode && !btn.classList.contains('holiday-btn')) btn.classList.add('selected');
  });
}

  });
}

document.getElementById('addCodeBtn').addEventListener('click', () => {
  const name = document.getElementById('newCodeName').value.trim();
  const start = document.getElementById('newCodeStart').value;
  const end = document.getElementById('newCodeEnd').value;
  const brkVal = parseInt(document.getElementById('newCodeBreak').value);
  const brk = isNaN(brkVal) ? 60 : brkVal;
  if (!name) { showToast('記号を入力してください'); return; }
  if (!start || !end) { showToast('開始・終了時間を入力してください'); return; }
  SHIFT_CODES[name] = { start, end, break: brk };
  saveShiftCodes(SHIFT_CODES);
  renderShiftCodeList();
  renderCodeBtns();
  document.getElementById('newCodeName').value = '';
  showToast(`「${name}」を追加しました`);
});

// 変更後タイプボタン
document.querySelectorAll('.after-type-btn').forEach(btn => {
  btn.addEventListener('click', () => setAfterType(btn.dataset.type));
});

// 一括入力
document.getElementById('batchBtn').addEventListener('click', openBatch);
document.getElementById('batchCloseBtn').addEventListener('click', closeBatch);
document.getElementById('batchApplyBtn').addEventListener('click', applyBatch);

// オーバーレイ背景タップで閉じる
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
});
document.getElementById('batchOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('batchOverlay')) closeBatch();
});

document.getElementById('settingsCloseBtn').addEventListener('click', closeSettings);
document.getElementById('saveTargetBtn').addEventListener('click', saveTarget);
document.getElementById('csvExportBtn').addEventListener('click', csvExport);
document.getElementById('csvSendBtn').addEventListener('click', csvSend);
document.getElementById('csvImportInput').addEventListener('change', function(e) {
  if (e.target.files[0]) { csvImport(e.target.files[0]); e.target.value = ''; }
});
document.getElementById('resetMonthBtn').addEventListener('click', resetMonth);

// ===== 起動 =====
initTimeSelects();
render();

// 今日の行にスクロール
setTimeout(() => {
  const todayEl = document.querySelector('.shift-row.today');
  if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 100);
</script>
</body>
</html>
